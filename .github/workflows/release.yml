name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
          - runner: macos-13
            target: x86_64-apple-darwin
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "13.0"
          CMAKE_OSX_DEPLOYMENT_TARGET: "13.0"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Plate ${{ github.ref_name }}"
          releaseBody: |
            Download the `.dmg` for your Mac below and drag Plate to Applications.

            | File | Mac type |
            |---|---|
            | `Plate_*_aarch64.dmg` | Apple Silicon (M1/M2/M3/M4) |
            | `Plate_*_x64.dmg` | Intel |

            > Requires macOS 13+. On first launch, right-click the app → **Open** to bypass Gatekeeper.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
