<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="128" y1="64" x2="384" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>

  <!-- Plate / disc shape - outer ring -->
  <circle cx="256" cy="244" r="148" stroke="#ffffff" stroke-width="28" fill="none" opacity="0.92"/>

  <!-- Inner disc detail -->
  <circle cx="256" cy="244" r="56" fill="#ffffff" opacity="0.2"/>
  <circle cx="256" cy="244" r="18" fill="#ffffff" opacity="0.92"/>

  <!-- Audio waveform bars at bottom - representing transcription -->
  <g opacity="0.92">
    <rect x="152" y="420" width="12" height="32" rx="6" fill="#ffffff"/>
    <rect x="180" y="408" width="12" height="56" rx="6" fill="#ffffff"/>
    <rect x="208" y="414" width="12" height="44" rx="6" fill="#ffffff"/>
    <rect x="236" y="400" width="12" height="72" rx="6" fill="#ffffff"/>
    <rect x="264" y="410" width="12" height="52" rx="6" fill="#ffffff"/>
    <rect x="292" y="404" width="12" height="64" rx="6" fill="#ffffff"/>
    <rect x="320" y="416" width="12" height="40" rx="6" fill="#ffffff"/>
    <rect x="348" y="422" width="12" height="28" rx="6" fill="#ffffff"/>
  </g>

  <!-- Subtle pen/note accent on top-right of disc -->
  <g transform="translate(340, 120) rotate(45)">
    <rect x="0" y="0" width="10" height="64" rx="5" fill="#ffffff" opacity="0.85"/>
    <polygon points="0,64 10,64 5,76" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>
